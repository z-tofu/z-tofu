<svg fill="none" viewBox="0 0 200 35" width="200" height="35" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif;">
      <style>
        @keyframes gradient_slide {
          0%   { background-position: 350% 0 }
          to   { background-position: -350% 0 }
        }

        .title {
          font-size: 20px;
          font-weight: 700;
          color: transparent;
          display: inline-block;
          background-image: linear-gradient(-220deg, #9f2236, #da95df, #6a5371);
          -webkit-background-clip: text;
          background-clip: text;
          background-size: 200% 120%;
          animation: gradient_slide 10s linear infinite;
          margin: 0;
        }

        code {
          font-family: monospace;
          font-size: 20px;
        }
      </style>
      <h2 class="title">hi, i'm <code>tofu</code>!</h2>
    </div>
  </foreignObject>
</svg>
